# ════════════════════════════════════════════════════════════════════════════
#  ml_quant_project — Central configuration
#  All file paths are relative to the project root (ml_quant_project/).
# ════════════════════════════════════════════════════════════════════════════

# ── Data ─────────────────────────────────────────────────────────────────────
data:
  tickers:
    - AAPL
    - SPY
    - "^NSEI"        # NIFTY 50 (yfinance symbol)
  start_date: "2015-01-01"
  end_date:   "2024-12-31"
  raw_dir:    "data/raw"
  cache_dir:  "data/cache"

# ── Labelling ────────────────────────────────────────────────────────────────
labelling:
  forecast_horizons: [1, 3, 7, 10]   # n-day ahead price movement
  threshold: 0.005                    # ±0.5 % → HOLD ; >0.5 % → BUY ; <-0.5 % → SELL
  # class mapping: BUY=1 / SELL=0 / HOLD=2

# ── Candlestick images ────────────────────────────────────────────────────────
images:
  window_sizes: [5, 10]               # rolling window (days)
  img_size: 64                        # resize target (px²) — 64×64 fits Colab free tier
  dpi: 80
  style: "classic"                    # mplfinance style
  image_dir: "data/images"

# ── HOG feature extraction ────────────────────────────────────────────────────
hog:
  orientations: 9
  pixels_per_cell: [16, 16]
  cells_per_block: [2, 2]

# ── Model ─────────────────────────────────────────────────────────────────────
model:
  image_embed_dim: 128      # CNN output embedding dimension
  hog_proj_dim:    64       # linear projection of HOG vector
  lstm_hidden:     128      # LSTM hidden size
  lstm_layers:     2
  attn_heads:      4
  dropout:         0.3
  num_classes:     3        # BUY / SELL / HOLD

# ── Training ─────────────────────────────────────────────────────────────────
training:
  batch_size:      32
  epochs:          10
  learning_rate:   0.001
  weight_decay:    1.0e-4
  early_stopping_patience: 4
  n_splits:        5        # time-series CV splits
  results_dir:     "results"
  checkpoint_dir:  "results/checkpoints"

# ── Backtesting ──────────────────────────────────────────────────────────────
backtest:
  initial_capital:    100000.0
  transaction_cost:   0.001    # 0.10 %
  slippage:           0.0005   # 0.05 %
  risk_free_rate:     0.04     # annual, for Sharpe computation
  position_size_pct:  1.0      # fraction of capital per trade (1.0 = full position)
